name: Build aks-desktop (macOS)

on:
  schedule:
    # Runs every day at 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      aks_plugin_branch:
        description: 'Branch to build aks-plugin'
        required: true
        default: 'main'

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install golang
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.24.*'

      - name: Setup nodejs
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 20.x

      - name: Checkout this repository with submodules
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.aks_plugin_branch }}
          submodules: recursive

      - name: Setup AKS desktop and Build Headlamp (macOS)
        run: npm run build:mac

      - name: Upload macOS build artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: aks-desktop-mac-dmgs
          path: headlamp/app/dist/aks-desktop*.dmg
