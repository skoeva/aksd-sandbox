name: Build aks-desktop (macOS)

on:
  schedule:
    # Runs every day at 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      aks_plugin_branch:
        description: 'Branch to build aks-plugin'
        required: true
        default: 'main'

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.24.*'

      - name: Setup nodejs
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20.x

      - name: Checkout this repository with submodules
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.aks_plugin_branch }}
          submodules: recursive

      - name: Setup AKS desktop and Build Headlamp (macOS)
        run: npm run build:mac

      - name: Upload macOS build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aks-desktop-mac-dmgs
          path: headlamp/app/dist/aks-desktop*.dmg
