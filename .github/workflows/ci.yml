name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  CACHE_KEY_PREFIX: "node-modules"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: [aks-desktop, ai-assistant, insights-plugin]
    defaults:
      run:
        working-directory: plugins/${{ matrix.plugin }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: plugins/${{ matrix.plugin }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run type checking
        run: npm run tsc

      - name: Run build
        run: npm run build

      - name: Run tests
        run: npm test

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: [aks-desktop, ai-assistant, insights-plugin]
    defaults:
      run:
        working-directory: plugins/${{ matrix.plugin }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: plugins/${{ matrix.plugin }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format -- --check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    strategy:
      matrix:
        plugin: [aks-desktop, ai-assistant, insights-plugin]
    defaults:
      run:
        working-directory: plugins/${{ matrix.plugin }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: plugins/${{ matrix.plugin }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package plugin
        run: npm run package

    # - name: Upload build artifacts
    #   uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
    #   with:
    #     name: build-artifacts
    #     path: |
    #       dist/
    #       *.tgz
    #     retention-days: 90

  translations:
    name: Translations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            plugins/aks-desktop/package-lock.json
            plugins/ai-assistant/package-lock.json

      - name: Install dependencies (aks)
        working-directory: plugins/aks-desktop
        run: npm ci

      - name: Install dependencies (ai)
        working-directory: plugins/ai-assistant
        run: npm ci

      - name: Generate English locale (aks)
        working-directory: plugins/aks-desktop
        run: npm run i18n

      - name: Generate English locale (ai)
        working-directory: plugins/ai-assistant
        run: npm run i18n

      - name: Collect translations
        working-directory: .
        run: npm run i18n:collect

      - name: Check translations are up to date
        working-directory: .
        run: |
          if [ -n "$(git status --porcelain Localize/)" ]; then
            echo "::error::Translation files are out of date. Run 'npm run i18n:collect' locally and commit the changes."
            git diff Localize/
            exit 1
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        plugin: [aks-desktop, ai-assistant, insights-plugin]
    defaults:
      run:
        working-directory: plugins/${{ matrix.plugin }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true
